name: Research and draft pet photography blog

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Research and generate one post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5
        run: npm run generate-blog

      - name: Validate generated site files
        run: |
          node --check scripts/generate_blog.js
          npm run sync-blog

      - name: Open review pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/researched-pet-blog
          delete-branch: true
          commit-message: 'Draft researched pet photography article'
          title: 'Review researched pet photography article'
          body: |
            This post was researched with web search and passed automated source checks.

            Before merging, please review every factual claim, open each source link, check the Snout ’n About voice, and confirm the booking call to action.
          labels: blog,needs-human-review
