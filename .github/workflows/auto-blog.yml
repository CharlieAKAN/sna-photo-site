name: Research and draft pet photography blog

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: researched-pet-blog
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check blog automation secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured in repository Actions secrets."
            exit 1
          fi

      - name: Research and generate one post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
          SITE_URL: ${{ vars.SITE_URL || 'https://charlieakan.github.io/sna-photo-site' }}
        run: pnpm run generate-blog

      - name: Validate generated site files
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://charlieakan.github.io/sna-photo-site' }}
        run: pnpm run validate

      - name: Open review pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/researched-pet-blog
          delete-branch: true
          commit-message: 'Draft researched pet photography article'
          title: 'Review researched pet photography article'
          body: |
            This post was researched with web search and passed automated source checks.

            Before merging, please review every factual claim, open each source link, check the Snout ’n About voice, and confirm the booking call to action.
          labels: blog,needs-human-review
