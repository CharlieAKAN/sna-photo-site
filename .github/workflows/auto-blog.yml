name: Generate and publish pet photography blog

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: researched-pet-blog
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check blog automation secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured in repository Actions secrets."
            exit 1
          fi

      - name: Research and generate one post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
          SITE_URL: https://sna-photo.com
        run: pnpm run generate-blog

      - name: Validate generated site files
        env:
          SITE_URL: https://sna-photo.com
        run: pnpm run validate

      - name: Commit generated article and SEO updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- blog/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No generated changes to publish."
            exit 0
          fi
          git commit -m "Publish researched pet photography article"
          git push origin HEAD:master
